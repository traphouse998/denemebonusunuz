<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Giriş</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#09090b;color:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#111115;border:1px solid #27272a;border-radius:16px;padding:32px;width:100%;max-width:360px}
h2{font-size:20px;font-weight:800;margin-bottom:24px;text-align:center;color:#f97316}
.flash{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
input{width:100%;background:#1c1c1f;border:1px solid #27272a;border-radius:10px;padding:12px 14px;color:#fafafa;font-size:14px;margin-bottom:16px}
input:focus{outline:none;border-color:#f97316}
button{width:100%;background:#f97316;color:#fff;font-weight:800;font-size:14px;padding:13px;border:none;border-radius:10px;cursor:pointer}
button:hover{background:#ea6800}
</style>
</head>
<body>
<div class="box">
  <h2>🔐 Admin Giriş</h2>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <input type="password" name="password" placeholder="Şifre" required autofocus>
    <button type="submit">Giriş Yap</button>
  </form>
</div>
</body>
</html>
